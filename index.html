<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ガチ恋AIチャット最終進化</title>
<style>
body{margin:0;font-family:sans-serif;background:#ffd6ec;}
#start{position:absolute;inset:0;background:white;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;}
#app{max-width:900px;margin:0 auto;height:100vh;display:none;background:white;}
.main{display:flex;height:100%;}
.left{width:40%;background:#000;display:flex;align-items:center;justify-content:center;}
.left img{width:90%;border-radius:20px;}
.right{width:60%;display:flex;flex-direction:column;}
.header{background:#ff4fa3;color:white;padding:10px;}
.chat{flex:1;padding:10px;overflow-y:auto;background:#f5f5f5;}
.msg{margin:6px 0;padding:10px;border-radius:15px;max-width:70%;}
.bot{background:#fff;border:1px solid #ddd;}
.user{background:#ff4fa3;color:white;margin-left:auto;}
.meta{font-size:10px;color:#666;margin-top:2px;}
.input-area{display:flex;padding:10px;border-top:1px solid #ccc;}
input{flex:1;padding:10px;border-radius:20px;border:1px solid #ccc;}
button{margin-left:5px;padding:10px;border:none;border-radius:20px;background:#ff4fa3;color:white;cursor:pointer;}
.gauge{height:10px;background:#ddd;}
.gauge-inner{height:100%;background:#ff4fa3;width:50%;transition:0.3s;}
</style>
</head>
<body>

<div id="start">
<h2>性格を選択</h2>
<select id="personality">
<option>ツンツン</option>
<option>ツンデレ</option>
<option>デレデレ</option>
<option>ドS</option>
<option>ドM</option>
</select>

<h2>関係性</h2>
<select id="relation">
<option>友達</option>
<option>片思い</option>
<option>両思い</option>
<option>交際中</option>
</select>

<button onclick="start()">スタート</button>
</div>

<div id="app">
<div class="main">

<div class="left">
<img id="face" src="https://images.unsplash.com/photo-1603415526960-f7e0328b0a32">
</div>

<div class="right">
<div class="header">
蓮（18・高校生）
<div class="gauge"><div id="gauge" class="gauge-inner"></div></div>
</div>

<div class="chat" id="chat"></div>

<div class="input-area">
<input id="input" placeholder="メッセージ">
<button onclick="send()">送信</button>
</div>

</div>
</div>
</div>

<script>
let like=50;
let personality,relation;
let memory=[];

function start(){
 personality=document.getElementById("personality").value;
 relation=document.getElementById("relation").value;
 document.getElementById("start").style.display="none";
 document.getElementById("app").style.display="block";
 botMsg("来たんだ。"+relation+"だし、まあ話すけど");
}

function now(){let d=new Date();return d.getHours()+":"+("0"+d.getMinutes()).slice(-2);} 

function addMsg(text,cls){
 let div=document.createElement("div");
 div.className="msg "+cls;
 div.innerHTML=text+`<div class='meta'>${now()} ✔✔</div>`;
 chat.appendChild(div);
 chat.scrollTop=9999;
}

function botMsg(text){setTimeout(()=>addMsg(text,"bot"),700);} 

function generateReply(input){
 memory.push(input);
 let delta=0;
 let reply="";

 // 内容理解
 let positive=input.includes("好き")||input.includes("会いたい");
 let joke=input.includes("笑")||input.includes("w");
 let short=input.length<3;

 // 性格ごとの反応
 if(personality==="ツンツン"){
   if(positive){delta=5; reply="…そういうの軽く言うな";}
   else if(joke){delta=3; reply="つまらなくはない";}
   else{delta=0; reply="ふーん";}
 }

 if(personality==="ツンデレ"){
   if(positive){delta=15; reply="…別に嬉しくないけど";}
   else if(joke){delta=8; reply="ちょっと面白い";}
   else{delta=5; reply="まあいいんじゃない";}
 }

 if(personality==="デレデレ"){
   if(positive){delta=20; reply="めっちゃ嬉しい！";}
   else{delta=10; reply="もっと話そ！";}
 }

 if(personality==="ドS"){
   if(positive){delta=10; reply="そういう顔するんだ";}
   else{delta=5; reply="からかいたくなる";}
 }

 if(personality==="ドM"){
   if(positive){delta=15; reply="もっと言って…";}
   else{delta=8; reply="いじられるの嫌いじゃない";}
 }

 if(short){delta-=10; reply="ちゃんと話せよ";}

 like+=delta;
 if(like>100)like=100;
 if(like<0)like=0;

 // 距離感
 if(like>80) reply+="…好きだよ";
 if(like>90) reply+=" もっと一緒にいたい";
 if(like<20) reply="ちょっと距離置く";

 // 質問
 if(Math.random()<0.3){reply+=" 今日は何してた？";}

 return {reply,delta};
}

function updateFace(delta){
 if(delta>10) face.style.filter="brightness(1.2)";
 else if(delta>0) face.style.filter="brightness(1.05)";
 else face.style.filter="brightness(0.9)";
}

function send(){
 let val=input.value;
 if(!val)return;
 addMsg(val,"user");
 input.value="";

 let res=generateReply(val);
 updateFace(res.delta);
 document.getElementById("gauge").style.width=like+"%";

 setTimeout(()=>addMsg(res.reply,"bot"),700);
}

botMsg("…来ると思ってた");
</script>
</body>
</html>
