<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ガチ恋AIチャット最終版</title>
<style>
body{margin:0;font-family:sans-serif;background:#ffd6ec;}
#app{max-width:900px;margin:0 auto;height:100vh;display:flex;background:white;}
.left{width:40%;background:#000;display:flex;align-items:center;justify-content:center;position:relative;}
.left img{width:90%;border-radius:20px;transition:0.3s;}
.right{width:60%;display:flex;flex-direction:column;}
.header{background:#ff4fa3;color:white;padding:10px;}
.chat{flex:1;padding:10px;overflow-y:auto;background:#f5f5f5;}
.msg{margin:6px 0;padding:10px;border-radius:15px;max-width:70%;}
.bot{background:#fff;border:1px solid #ddd;}
.user{background:#ff4fa3;color:white;margin-left:auto;}
.meta{font-size:10px;color:#666;margin-top:2px;}
.input-area{display:flex;padding:10px;border-top:1px solid #ccc;}
input{flex:1;padding:10px;border-radius:20px;border:1px solid #ccc;}
button{margin-left:5px;padding:10px;border:none;border-radius:20px;background:#ff4fa3;color:white;}
.gauge{height:10px;background:#ddd;}
.gauge-inner{height:100%;background:#ff4fa3;width:50%;transition:0.3s;}
</style>
</head>
<body>
<div id="app">

<div class="left">
<img id="face" src="https://i.imgur.com/8Km9tLL.png">
</div>

<div class="right">
<div class="header">
<span id="name">蓮</span>
<div class="gauge"><div id="gauge" class="gauge-inner"></div></div>
</div>

<div class="chat" id="chat"></div>

<div class="input-area">
<input id="input" placeholder="メッセージ">
<button onclick="send()">送信</button>
</div>
</div>

</div>

<script>
let like=50;
let memory=[];

const faces={
normal:"https://i.imgur.com/8Km9tLL.png",
happy:"https://i.imgur.com/5cX1Z6B.png",
shy:"https://i.imgur.com/J8QZ6Qp.png"
};

function now(){let d=new Date();return d.getHours()+":"+("0"+d.getMinutes()).slice(-2);} 

function addMsg(text,cls){
 let div=document.createElement("div");
 div.className="msg "+cls;
 div.innerHTML=text+`<div class='meta'>${now()} ✔✔</div>`;
 chat.appendChild(div);
 chat.scrollTop=9999;
}

function thinkReply(input){
 let reply="";
 let delta=0;

 // 記憶
 memory.push(input);

 if(input.includes("好き")){
   delta=20;
   reply="…急にそういうこと言うの反則";
 }
 else if(input.includes("会いたい")){
   delta=15;
   reply="俺も会いたいって思ってた";
 }
 else if(input.includes("何してる")){
   delta=5;
   reply="今は君のこと考えてた";
 }
 else if(input.length<3){
   delta=-10;
   reply="ちゃんと話してよ";
 }
 else{
   delta=5;
   reply="それいいね、もっと聞かせて";
 }

 like+=delta;
 if(like>100)like=100;
 if(like<0)like=0;

 // 距離感変化
 if(like>80) reply+="…好きだよ";
 if(like>90) reply+=" もっと一緒にいたい";
 if(like<20) reply="少し距離置こう";

 // たまに質問
 if(Math.random()<0.3){
   reply+=" ねえ、君はどう思う？";
 }

 return {reply,delta};
}

function updateFace(delta){
 if(delta>10) face.src=faces.happy;
 else if(delta>0) face.src=faces.shy;
 else face.src=faces.normal;
}

function send(){
 let val=input.value;
 if(!val) return;
 addMsg(val,"user");
 input.value="";

 let res=thinkReply(val);
 document.getElementById("gauge").style.width=like+"%";
 updateFace(res.delta);

 setTimeout(()=>addMsg(res.reply,"bot"),800);
}

// 初期
addMsg("来てくれてありがと","bot");
document.getElementById("gauge").style.width=like+"%";
</script>
</body>
</html>
