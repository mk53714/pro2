<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>君とヒミツのトーク</title>
<style>
body{margin:0;font-family:sans-serif;}
#start{position:absolute;inset:0;background:white;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;}
#app{max-width:900px;margin:0 auto;height:100vh;display:none;background:white;}
.main{display:flex;height:100%;}
.left{width:40%;background:#111;display:flex;align-items:center;justify-content:center;}
.left img{width:90%;border-radius:20px;}
.right{width:60%;display:flex;flex-direction:column;}
.header{background:#ff4fa3;color:white;padding:10px;}
.chat{flex:1;padding:10px;overflow-y:auto;background:#f5f5f5;}
.msg{margin:6px 0;padding:10px;border-radius:15px;max-width:70%;}
.bot{background:#fff;border:1px solid #ddd;}
.user{background:#ff4fa3;color:white;margin-left:auto;}
.meta{font-size:10px;color:#666;margin-top:2px;}
.typing{font-size:12px;color:#888;margin:5px;}
.input-area{display:flex;padding:10px;border-top:1px solid #ccc;}
input{flex:1;padding:10px;border-radius:20px;border:1px solid #ccc;}
button{margin-left:5px;padding:10px;border:none;border-radius:20px;background:#ff4fa3;color:white;}
.gauge{height:10px;background:#ddd;}
.gauge-inner{height:100%;background:red;width:50%;transition:0.3s;}
</style>
</head>
<body>

<div id="start">
<h2>君とヒミツのトーク</h2>
<input id="username" placeholder="名前">
<select id="personality">
<option>ツンデレ</option>
<option>デレデレ</option>
<option>クール</option>
</select>
<select id="relation">
<option>片思い</option>
<option>両思い</option>
<option>交際中</option>
</select>
<button onclick="startGame()">スタート</button>
</div>

<div id="app">
<div class="main">
<div class="left">
<img src="/mnt/data/60b0c129-17a9-4f15-89df-1e1880dd399b.png">
</div>
<div class="right">
<div class="header">
<span id="title"></span>
<div>❤️ 好感度</div>
<div class="gauge"><div id="gauge" class="gauge-inner"></div></div>
</div>
<div class="chat" id="chat"></div>
<div class="typing" id="typing"></div>
<div class="input-area">
<input id="input">
<button onclick="send()">送信</button>
</div>
</div>
</div>
</div>

<script>
let like=50;
let username, personality, relation;
let turn=0;
let memory=[];

function startGame(){
 username=document.getElementById("username").value||"君";
 personality=document.getElementById("personality").value;
 relation=document.getElementById("relation").value;
 document.getElementById("start").style.display="none";
 document.getElementById("app").style.display="block";
 document.getElementById("title").textContent="蓮 × "+relation;

 // 初期セリフ（条件分岐）
 if(relation==="交際中" && personality==="デレデレ"){
   botMsg(`今日は一緒に帰れて嬉しかった。今日も可愛かったよ${username}`);
 }
 else if(relation==="交際中" && personality==="ツンデレ"){
   botMsg("ちゃんと家帰れたか？");
   setTimeout(()=>botMsg("明日も帰ろ"),1200);
 }
 else{
   botMsg(`来たんだ、${username}`);
 }
}

function now(){let d=new Date();return d.getHours()+":"+("0"+d.getMinutes()).slice(-2);} 

function addMsg(text,cls){
 let div=document.createElement("div");
 div.className="msg "+cls;
 div.innerHTML=text+`<div class='meta'>${now()} ✔✔</div>`;
 chat.appendChild(div);
 chat.scrollTop=9999;
}

function typingEffect(cb){
 typing.textContent="…入力中";
 setTimeout(()=>{typing.textContent="";cb();},800+Math.random()*1200);
}

function botMsg(text){typingEffect(()=>addMsg(text,"bot"));}

function generateReply(input){
 turn++;
 memory.push(input);
 let reactions=["へえ","いいね","それ気になる","ちょっと意外","なんか好き"];
 let questions=["それっていつ？","なんで？","どう思った？","他には？"];

 let r=reactions[Math.floor(Math.random()*reactions.length)];
 let q=questions[Math.floor(Math.random()*questions.length)];

 let reply=`${r}、${username}っぽい。${q}`;

 // 関係性で態度変化
 if(relation==="片思い") reply+=" …でももっと知りたい";
 if(relation==="両思い") reply+=" 一緒にいると落ち着く";
 if(relation==="交際中") reply+=" ずっと一緒にいたい";

 // 愛情（3回に1回）
 if(turn%3===0) reply+=` …好きだよ${username}`;

 return reply;
}

function send(){
 let val=input.value;
 if(!val)return;
 addMsg(val,"user");
 input.value="";

 setTimeout(()=>{
   let reply=generateReply(val);
   botMsg(reply);
   like+=5;
   if(like>100)like=100;
   gauge.style.width=like+"%";
 },800);
}

</script>
</body>
</html>
