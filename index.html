<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>モテモテ恋愛アプリ</title>
<style>
body{font-family:sans-serif;background:linear-gradient(135deg,#ffe0f0,#e0f7ff);text-align:center;margin:0;padding:0;}
h1{margin:20px;color:#ff4fa3;}
#container{max-width:600px;margin:0 auto;padding:20px;}
.card{background:white;border-radius:20px;padding:20px;margin:20px 0;box-shadow:0 10px 20px rgba(0,0,0,0.1);}
.character{font-size:22px;margin-bottom:10px;}
.type{font-size:14px;color:#666;margin-bottom:10px;}
.button{padding:10px 20px;border:none;border-radius:20px;background:#ff4fa3;color:white;cursor:pointer;margin-top:10px;}
.button:hover{background:#ff2f90;}
.message{margin-top:15px;font-size:16px;color:#333;}
</style>
</head>
<body>
<h1>モテモテ恋愛シミュレーション</h1>
<div id="container">
  <div class="card">
    <div class="character" id="name"></div>
    <div class="type" id="type"></div>
    <button class="button" onclick="talk()">話しかける</button>
    <div class="message" id="message"></div>
  </div>
  <button class="button" onclick="nextCharacter()">次のイケメン</button>
</div>

<script>
const characters = [
  {
    name:"蓮",
    face:"塩顔",
    personality:"ツンデレ",
    lines:[
      "べ、別に君のためじゃないけど…気づいたら目で追ってた",
      "今日は…その…可愛いんじゃない？別に特別じゃないけど",
      "俺に構ってほしいなら、もう少し近くに来れば？"
    ]
  },
  {
    name:"悠真",
    face:"しょうゆ顔",
    personality:"デレデレ",
    lines:[
      "ねえ、今日もめっちゃ可愛いね。ずっと見てたい",
      "君と話すだけで一日が最高になるんだけど",
      "こんなにドキドキするの、君のせいだよ"
    ]
  },
  {
    name:"蒼",
    face:"塩顔",
    personality:"クール",
    lines:[
      "…君って不思議だね。目が離せない",
      "静かな時間、君となら悪くない",
      "近くにいると落ち着く。理由はわからないけど"
    ]
  },
  {
    name:"颯",
    face:"ソース顔",
    personality:"情熱系",
    lines:[
      "会えた瞬間、心臓が跳ねた。君のせいだ",
      "こんなに惹かれるなんて思わなかった",
      "もう遠慮しない。君のこと、もっと知りたい"
    ]
  },
  {
    name:"湊",
    face:"しょうゆ顔",
    personality:"癒し系",
    lines:[
      "無理しなくていいよ。君はそのままで可愛い",
      "一緒にいると、すごく安心するんだ",
      "今日も頑張ってるね。ちゃんと見てるよ"
    ]
  }
];

let current = 0;

function render(){
  const c = characters[current];
  document.getElementById("name").textContent = c.name;
  document.getElementById("type").textContent = c.face + " × " + c.personality;
  document.getElementById("message").textContent = "";
}

function talk(){
  const c = characters[current];
  const line = c.lines[Math.floor(Math.random()*c.lines.length)];
  document.getElementById("message").textContent = line;
}

function nextCharacter(){
  current = (current + 1) % characters.length;
  render();
}

render();
</script>
</body>
</html>
